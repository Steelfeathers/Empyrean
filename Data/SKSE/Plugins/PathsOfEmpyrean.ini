; Do not edit this INI directly. This plugin supports a "custom" INI to overwrite settings.
; The purpose of the default INI is for the author to more easily test/change things.
; Usave of the custom INI is intended for advanced users that want to safely modify settings.

; How to use the custom INI:
;	1. Copy this file.
;	2. Rename the copy to be the same, but with "_Custom" at the end.
;		For example, TestProject.ini becomes TestProject_Custom.ini 
;	3. Change any settings you want in the new file. This preservers compatibility with
;			future updates that may invalidate certain settings. 


[Unarmed]
;Gain LightArmor XP from unarmed attacks while wearing LightArmor gloves
bGetLightArmorXPFromUnarmedAttacks = true
;Gain HeavyArmor XP from unarmed attacks while wearing HeavyArmor gloves
bGetHeavyArmorXPFromUnarmedAttacks = true
;Only disable this if you have another mod that fixes unarmed attack scaling from WeaponSpeedMult, otherwise "Sparring Practice" will stop working
bEnableUnarmedWeapSpeedMultFix = true
